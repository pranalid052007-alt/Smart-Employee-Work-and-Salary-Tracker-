<!-- Edit Employee template for admins -->
{% extends 'base.html' %}

{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom">
  <h1 class="h2">Edit Employee</h1>
</div>

<div class="card">
  <div class="card-body">
    <form method="POST">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Name</label>
          <input class="form-control" name="name" value="{{ employee['name'] }}" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" name="email" value="{{ employee['email'] }}">
        </div>
      </div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">Department</label>
          <input class="form-control" name="department" value="{{ employee['department'] }}">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Role</label>
          <input class="form-control" name="role" value="{{ employee['role'] }}">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Base Salary</label>
          <input class="form-control" name="base_salary" type="number" step="0.01" value="{{ employee['base_salary'] }}">
        </div>
      </div>
      <button class="btn btn-primary">Save Changes</button>
    </form>
  </div>
</div>

{% endblock %}
