<!-- Line 5: Jinja statement to extend the base layout `base.html` -->
{% extends 'base.html' %}

<!-- Line 7: start of the `content` block which fills base layout's placeholder -->
{% block content %}

<!-- Line 10: close the top section wrapper -->

<!-- Line 11: blank line separating sections -->

<!-- Line 19: close card -->
    </div>

<!-- Line 22: card wrapper for tasks chart -->
    <div class="card">
<!-- Line 23: card body for tasks chart -->
      <div class="card-body">
<!-- Line 24: title for tasks chart -->
        <h5 class="card-title">Tasks Completed (last 30)</h5>

<!-- Line 26: close card body -->
      </div>
<!-- Line 27: close card -->
    </div>

  </div>
<!-- Line 29: close the top row container -->

<!-- Line 30: blank line before next row -->

<!-- Line 32: first column in this row for department counts -->

    <div class="card">
<!-- Line 34: card body container -->
      <div class="card-body">

<!-- Line 37: close card body -->
      </div>
<!-- Line 38: close card -->
    </div>
<!-- Line 39: close first column of second row -->
  </div>
<!-- Line 40: second column for top performers chart -->
  <div class="col-md-6 mb-4">
<!-- Line 41: card wrapper for top performers -->
    <div class="card">
<!-- Line 42: card body -->
      <div class="card-body">
<!-- Line 43: title for top performers chart -->
        <h5 class="card-title">Top Performers</h5>
<!-- Line 44: canvas element for top performers chart -->

<!-- Line 45: close card body -->

<!-- Line 46: close card -->

<!-- Line 48: close second row container -->
</div>

<!-- Line 50: comment indicating preparation of JS data from server-side variables -->
<!-- Prepare data for JS from server-side variables -->

<script>
<!-- Line 52: comment indicating attendance chart data lines -->
  // Attendance chart data
<!-- Line 53: assign attendance labels from Jinja variable, serialized to JSON -->
  const attendanceLabels = {{ attendance_labels|tojson }};
<!-- Line 54: assign attendance numeric data from Jinja variable -->
  const attendanceData = {{ attendance_data|tojson }};

<!-- Line 55: comment indicating tasks chart data section -->
  // Tasks chart data
<!-- Line 56: assign tasks labels from server-side variable -->
  const tasksLabels = {{ tasks_labels|tojson }};
<!-- Line 57: assign tasks numeric data -->
  const tasksData = {{ tasks_data|tojson }};

<!-- Line 58: comment indicating department chart data -->
  // Department data
<!-- Line 59: assign department labels -->
  const deptLabels = {{ dept_labels|tojson }};
<!-- Line 60: assign department counts -->
  const deptData = {{ dept_data|tojson }};

<!-- Line 61: comment indicating top performers data -->
  // Top performers
<!-- Line 62: assign top performer labels -->
  const topLabels = {{ top_labels|tojson }};
<!-- Line 63: assign top performer numeric data -->

<!-- Line 64: end of script block -->
</script>

<!-- Line 65: end of Jinja `content` block to return control to base template -->
{% endblock %}
