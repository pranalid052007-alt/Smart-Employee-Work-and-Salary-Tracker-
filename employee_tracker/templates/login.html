<!-- Login page template
  - Collects Employee ID and Password
  - Shows error messages via Flask flash messages
-->
{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
  <!-- App title on login page for clear identification during demo -->
  <div class="row justify-content-center mb-3">
    <div class="col-md-8 text-center">
      <h1 class="h3">Smart Employee Work & Salary Tracker</h1>
      <p class="text-muted">Company employee management system</p>
    </div>
  </div>
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Login</h5>
          <!-- Login form posts to /login route -->
          <form method="POST">
            <div class="mb-3">
              <label for="employee_id" class="form-label">Employee ID</label>
              <input type="text" class="form-control" id="employee_id" name="employee_id" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
          <hr>
          <p class="small text-muted">Sample Admin: <strong>ADMIN01</strong> / adminpass</p>
          <p class="small text-muted">Sample Employee: <strong>EMP001</strong> / employeepass</p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
