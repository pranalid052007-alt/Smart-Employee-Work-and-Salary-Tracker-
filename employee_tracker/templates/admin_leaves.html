<!-- Admin leaves management template
  - Lists leave requests with buttons to approve or reject
-->
{% extends 'base.html' %}

{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-center">
  <h1 class="h2">Leave Requests</h1>
  <a href="{{ url_for('employee_management') }}" class="btn btn-secondary">Back to Employees</a>
</div>

<div class="table-responsive">
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Employee ID</th>
        <th>Leave Date</th>
        <th>Reason</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for r in requests %}
      <tr>
        <td>{{ r['employee_id'] }}</td>
        <td>{{ r['leave_date'] }}</td>
        <td>{{ r['reason'] }}</td>
        <td>{{ r['status'] }}</td>
        <td>
          <form method="POST" action="{{ url_for('leave_action', id=r['id']) }}" style="display:inline-block;">
            <button name="action" value="approve" class="btn btn-sm btn-success">Approve</button>
          </form>
          <form method="POST" action="{{ url_for('leave_action', id=r['id']) }}" style="display:inline-block;">
            <button name="action" value="reject" class="btn btn-sm btn-danger">Reject</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="5" class="text-center">No leave requests.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
